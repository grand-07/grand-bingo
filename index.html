<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Mobile Optimized</title>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --accent: #38bdf8;
            --accent-glow: rgba(56, 189, 248, 0.4);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --danger: #f43f5e;
            --cell-bg: #334155;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Login Screen */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-box {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--accent);
            text-align: center;
            width: 100%;
            max-width: 320px;
        }

        .login-box input {
            background: var(--bg-deep);
            border: 1px solid var(--text-dim);
            padding: 12px;
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        .dashboard {
            display: flex;
            flex-direction: row; /* Desktop layout */
            background: var(--bg-card);
            border-radius: 24px;
            max-width: 1000px;
            width: 95%;
            margin: 20px auto;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        /* Mobile specific layout change */
        @media (max-width: 768px) {
            .dashboard {
                flex-direction: column; /* Mobile-e ekta arektar niche ashbe */
                height: auto;
                margin: 10px auto;
            }
            .sidebar {
                border-right: none !important;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                padding: 20px !important;
            }
            .main-content {
                padding: 20px !important;
            }
            #number-display {
                font-size: 60px !important;
            }
            .cell {
                width: 100% !important;
                height: 55px !important;
            }
        }

        .dev-container {
            position: absolute;
            top: 15px;
            left: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 20;
            background: rgba(0,0,0,0.3);
            padding: 5px 10px;
            border-radius: 20px;
        }

        .dev-label { font-size: 10px; font-weight: bold; color: var(--text-dim); }

        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(16px); }

        #live-clock {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 8px;
            color: var(--accent);
            font-family: monospace;
            font-size: 12px;
        }

        .sidebar {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(15, 23, 42, 0.5);
            padding: 40px;
            border-right: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }

        #number-display { font-size: 80px; font-weight: 900; color: var(--text-main); margin: 10px 0; }

        .main-content {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            background: var(--bg-deep);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
        }

        .cell {
            aspect-ratio: 1/1;
            background: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            border-radius: 8px;
            color: var(--text-main);
            border: 1px solid rgba(255,255,255,0.05);
            font-size: 18px;
        }

        .cell.selected { background: var(--accent); color: var(--bg-deep); }

        .btn {
            padding: 12px;
            background: var(--accent);
            color: var(--bg-deep);
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .btn-reset { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

        #win-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        #win-overlay.show { display: flex; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color: var(--accent); margin-bottom: 20px;">BINGO LOGIN</h2>
            <input type="text" id="player-name-input" placeholder="Enter Name">
            <button class="btn" onclick="startGame()">START GAME</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="dev-container">
            <span class="dev-label">DEV</span>
            <label class="switch">
                <input type="checkbox" id="dev-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <div id="live-clock">TIME: 00:00</div>

        <div class="sidebar">
            <div id="timer-text" style="font-size: 10px; color: var(--accent);">READY</div>
            <div id="number-display">--</div>
            <button id="draw-btn" class="btn" onclick="drawNumber()">DRAW NUMBER</button>
            <button class="btn btn-reset" onclick="location.reload()">RESET</button>
        </div>

        <div class="main-content">
            <div id="bingo-card" class="grid"></div>
        </div>
    </div>

    <div id="win-overlay">
        <h1 style="color: var(--success); font-size: 40px;">BINGO!</h1>
        <p id="player-victory-name" style="font-size: 20px;"></p>
        <p id="final-playtime"></p>
        <button class="btn" style="max-width: 200px;" onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsggGkrXbobuUlSe8i8VI5ojimoJy9Ec_oSD96yq_WX5mCE_qBo1sESFNnTQRdwIo2YQ/exec";
        let playerName = "", calledNumbers = [], totalSecondsPlayed = 0, stopwatchInterval = null, isLocked = false, gameStarted = false;

        // Dev Mode Password
        document.getElementById('dev-mode-toggle').addEventListener('change', function() {
            if (this.checked) {
                if (prompt("Enter Password:") !== "bjo172") {
                    alert("Wrong Password!");
                    this.checked = false;
                }
            }
        });

        function startGame() {
            const val = document.getElementById('player-name-input').value.trim();
            if (!val) return alert("Enter Name!");
            playerName = val;
            document.getElementById('login-screen').style.display = 'none';
            generateCard();
        }

        function generateCard() {
            const container = document.getElementById('bingo-card');
            container.innerHTML = '';
            let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            for (let i = 0; i < 25; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                let val = (i === 12) ? "FREE" : nums[i];
                cell.innerText = val;
                if (val === "FREE") cell.classList.add('selected');
                cell.onclick = () => {
                    if (isLocked || val === "FREE") return;
                    startTimer();
                    if (document.getElementById('dev-mode-toggle').checked || calledNumbers.includes(Number(val))) {
                        cell.classList.toggle('selected');
                        checkWin();
                    }
                };
                container.appendChild(cell);
            }
        }

        function startTimer() {
            if (!gameStarted) {
                gameStarted = true;
                stopwatchInterval = setInterval(() => {
                    totalSecondsPlayed++;
                    let m = Math.floor(totalSecondsPlayed / 60), s = totalSecondsPlayed % 60;
                    document.getElementById('live-clock').innerText = `TIME: ${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }, 1000);
            }
        }

        function drawNumber() {
            if (isLocked) return;
            startTimer();
            let n; do { n = Math.floor(Math.random()*75)+1; } while(calledNumbers.includes(n));
            calledNumbers.push(n);
            document.getElementById('number-display').innerText = n;

            document.getElementById('draw-btn').disabled = true;
            setTimeout(() => document.getElementById('draw-btn').disabled = false, 3000);
        }

        function checkWin() {
            if (document.querySelectorAll('.cell.selected').length === 25) {
                isLocked = true;
                clearInterval(stopwatchInterval);
                const timeStr = document.getElementById('live-clock').innerText.replace('TIME: ', '');
                document.getElementById('player-victory-name').innerText = playerName;
                document.getElementById('final-playtime').innerText = "Time: " + timeStr;
                document.getElementById('win-overlay').classList.add('show');

                fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: playerName, playtime: timeStr, seconds: totalSecondsPlayed })});
            }
        }
    </script>
</body>
</html>
