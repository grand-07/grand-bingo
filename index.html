<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - Compact Mobile</title>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --cell-bg: #334155;
            --danger: #f43f5e;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-deep); 
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Login Screen - Aro choto kora hoyeche */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px; /* Side padding jeno frame-e na badhe */
        }

        .login-box {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--accent);
            text-align: center;
            width: 100%;
            max-width: 280px; /* Width aro komiye deya hoyeche */
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .login-box h2 {
            font-size: 18px;
            margin-top: 0;
            color: var(--accent);
        }

        .login-box input {
            background: var(--bg-deep);
            border: 1px solid #475569;
            padding: 10px;
            color: white;
            border-radius: 8px;
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box; /* Ete padding width-er bhitore thake */
            outline: none;
            font-size: 14px;
        }

        .dashboard {
            display: flex;
            flex-direction: column; /* Mobile first vertically stack */
            background: var(--bg-card);
            border-radius: 20px;
            width: 92%;
            max-width: 400px;
            margin: 10px auto;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }

        /* Desktop layout jodi screen boro hoy */
        @media (min-width: 769px) {
            .dashboard { flex-direction: row; max-width: 900px; }
            .sidebar { border-right: 1px solid rgba(255,255,255,0.1); }
        }

        .dev-container {
            position: absolute;
            top: 10px; left: 10px;
            z-index: 20;
            background: rgba(0,0,0,0.4);
            padding: 4px 8px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #live-clock { 
            position: absolute; 
            top: 10px; right: 10px; 
            background: rgba(0,0,0,0.4); 
            padding: 5px 10px; 
            border-radius: 6px; 
            color: var(--accent); 
            font-size: 12px;
            font-family: monospace;
        }

        .sidebar { 
            padding: 30px 20px 15px; 
            text-align: center;
            background: rgba(15, 23, 42, 0.3);
        }

        #number-display { font-size: 50px; font-weight: 800; margin: 10px 0; }
        
        .main-content { padding: 15px; background: var(--bg-deep); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 6px; 
        }

        .cell { 
            aspect-ratio: 1/1;
            background: var(--cell-bg); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 700; 
            border-radius: 6px; 
            font-size: 14px;
            user-select: none;
        }

        .cell.selected { background: var(--accent); color: var(--bg-deep); }

        .btn { 
            padding: 10px; 
            background: var(--accent); 
            color: var(--bg-deep); 
            border: none; 
            border-radius: 8px; 
            font-weight: 700; 
            width: 100%; 
            margin-bottom: 8px;
            cursor: pointer;
        }

        .btn-reset { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

        /* Dev Switch */
        .switch { position: relative; display: inline-block; width: 30px; height: 16px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; border-radius: 34px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 10px; width: 10px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(14px); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>BINGO JOIN</h2>
            <input type="text" id="player-name-input" placeholder="Your Name" maxlength="15">
            <button class="btn" onclick="startGame()">ENTER GAME</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="dev-container">
            <span style="font-size: 9px; color: var(--text-dim);">DEV</span>
            <label class="switch">
                <input type="checkbox" id="dev-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <div id="live-clock">00:00</div>

        <div class="sidebar">
            <div id="number-display">--</div>
            <button id="draw-btn" class="btn" onclick="drawNumber()">DRAW</button>
            <button class="btn btn-reset" style="font-size: 11px;" onclick="location.reload()">RESET</button>
        </div>

        <div class="main-content">
            <div id="bingo-card" class="grid"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsggGkrXbobuUlSe8i8VI5ojimoJy9Ec_oSD96yq_WX5mCE_qBo1sESFNnTQRdwIo2YQ/exec";
        let playerName = "", calledNumbers = [], totalSecondsPlayed = 0, stopwatchInterval = null, isLocked = false, gameStarted = false;

        document.getElementById('dev-mode-toggle').addEventListener('change', function() {
            if (this.checked && prompt("Password:") !== "bjo172") {
                alert("Denied!"); this.checked = false;
            }
        });

        function startGame() {
            const val = document.getElementById('player-name-input').value.trim();
            if (!val) return;
            playerName = val;
            document.getElementById('login-screen').style.display = 'none';
            generateCard();
        }

        function generateCard() {
            const container = document.getElementById('bingo-card');
            container.innerHTML = '';
            let nums = Array.from({length: 75}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            for (let i = 0; i < 25; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                let val = (i === 12) ? "FREE" : nums[i];
                cell.innerText = val;
                if (val === "FREE") cell.classList.add('selected');
                cell.onclick = () => {
                    if (isLocked || val === "FREE") return;
                    startTimer();
                    if (document.getElementById('dev-mode-toggle').checked || calledNumbers.includes(Number(val))) {
                        cell.classList.toggle('selected');
                        if (document.querySelectorAll('.cell.selected').length === 25) win();
                    }
                };
                container.appendChild(cell);
            }
        }

        function startTimer() {
            if (!gameStarted) {
                gameStarted = true;
                stopwatchInterval = setInterval(() => {
                    totalSecondsPlayed++;
                    let m = Math.floor(totalSecondsPlayed/60), s = totalSecondsPlayed%60;
                    document.getElementById('live-clock').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }, 1000);
            }
        }

        function drawNumber() {
            if (isLocked) return;
            startTimer();
            let n; do { n = Math.floor(Math.random()*75)+1; } while(calledNumbers.includes(n));
            calledNumbers.push(n);
            document.getElementById('number-display').innerText = n;
            document.getElementById('draw-btn').disabled = true;
            setTimeout(() => document.getElementById('draw-btn').disabled = false, 2500);
        }

        function win() {
            isLocked = true; clearInterval(stopwatchInterval);
            alert("BINGO! Syncing data...");
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: playerName, playtime: document.getElementById('live-clock').innerText, seconds: totalSecondsPlayed })});
        }
    </script>
</body>
</html>
