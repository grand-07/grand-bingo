<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Pro - No Delay Edition</title>
    <style>
        :root {
            --bg-deep: #0f172a;
            --bg-card: #1e293b;
            --accent: #38bdf8;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --cell-bg: #334155;
            --danger: #f43f5e;
            --success: #22c55e;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-deep); color: var(--text-main); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

        /* Login Screen */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .login-box {
            background: var(--bg-card);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid var(--accent);
            text-align: center;
            width: 100%;
            max-width: 280px;
        }

        .name-format-note { color: var(--danger); font-size: 11px; font-weight: bold; margin-bottom: 15px; display: block; }

        .login-box input {
            background: var(--bg-deep);
            border: 1px solid #475569;
            padding: 10px;
            color: white;
            border-radius: 8px;
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
        }

        /* Win Overlay */
        #win-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        #win-overlay.show { display: flex; }

        .dashboard {
            display: flex;
            flex-direction: column;
            background: var(--bg-card);
            border-radius: 20px;
            width: 92%;
            max-width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .dev-container { position: absolute; top: 10px; left: 10px; z-index: 20; display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 15px; }
        #live-clock { position: absolute; top: 10px; right: 10px; color: var(--accent); font-size: 14px; font-family: monospace; font-weight: bold; }

        .sidebar { padding: 35px 20px 10px; text-align: center; }
        #number-display { font-size: 55px; font-weight: 800; margin: 5px 0; color: white; }

        .called-list-container {
            background: rgba(0,0,0,0.2);
            padding: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            text-align: left;
        }
        .called-list-title { font-size: 10px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 5px; display: block; }
        #called-numbers-history {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
            padding-bottom: 5px;
            scrollbar-width: thin;
        }
        .history-item {
            background: var(--cell-bg);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
            color: var(--accent);
        }

        .main-content { padding: 15px; background: var(--bg-deep); }

        /* 4x4 Grid */
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .cell { aspect-ratio: 1/1; background: var(--cell-bg); display: flex; align-items: center; justify-content: center; font-weight: 700; border-radius: 6px; font-size: 16px; }
        .cell.selected { background: var(--accent); color: var(--bg-deep); box-shadow: 0 0 10px var(--accent); }

        .btn { padding: 12px; background: var(--accent); color: var(--bg-deep); border: none; border-radius: 8px; font-weight: 700; width: 100%; margin-bottom: 8px; cursor: pointer; text-transform: uppercase; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .btn-reset { background: transparent; color: var(--danger); border: 1px solid var(--danger); font-size: 11px; }
        #cooldown-text { color: var(--danger); font-weight: bold; margin-top: 15px; font-size: 18px; }

        .switch { position: relative; display: inline-block; width: 30px; height: 16px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #475569; border-radius: 34px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 10px; width: 10px; left: 3px; bottom: 3px; background-color: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background-color: var(--danger); }
        input:checked + .slider:before { transform: translateX(14px); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>BINGO JOIN</h2>
            <span class="name-format-note">Name format : Nick Wildee</span>
            <input type="text" id="player-name-input" placeholder="Your Name">
            <button class="btn" onclick="startGame()">ENTER GAME</button>
        </div>
    </div>

    <div id="win-overlay">
        <h1 style="color: var(--success); font-size: 35px; margin-bottom: 5px;">CONGRATULATIONS!</h1>
        <h2 id="win-player-name" style="color: white; margin: 0;">PLAYER</h2>
        <div id="win-time" style="font-size: 20px; color: var(--accent); font-family: monospace; margin: 15px 0;">Time: 00:00</div>
        <div id="cooldown-text">Wait: 10:00</div>
        <button id="play-again-btn" class="btn" style="max-width: 200px; margin-top: 15px;" onclick="location.reload()" disabled>PLAY AGAIN</button>
    </div>

    <div class="dashboard">
        <div class="dev-container">
            <span style="font-size: 9px; color: var(--text-dim);">DEV</span>
            <label class="switch">
                <input type="checkbox" id="dev-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <div id="live-clock">00:00</div>

        <div class="sidebar">
            <div id="number-display">--</div>
            <button id="draw-btn" class="btn" onclick="drawNumber()">DRAW NUMBER</button>
            <button class="btn btn-reset" onclick="location.reload()">RESET</button>
        </div>

        <div class="called-list-container">
            <span class="called-list-title">Called Numbers:</span>
            <div id="called-numbers-history">
                <span style="color: #475569; font-size: 12px;">No numbers called yet</span>
            </div>
        </div>

        <div class="main-content">
            <div id="bingo-card" class="grid"></div>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwsggGkrXbobuUlSe8i8VI5ojimoJy9Ec_oSD96yq_WX5mCE_qBo1sESFNnTQRdwIo2YQ/exec";
        let playerName = "", calledNumbers = [], totalSecondsPlayed = 0, stopwatchInterval = null, isLocked = false, gameStarted = false;

        document.getElementById('dev-mode-toggle').addEventListener('change', function() {
            if (this.checked && prompt("Password:") !== "bjo172") {
                alert("Denied!"); this.checked = false;
            }
        });

        function startGame() {
            const val = document.getElementById('player-name-input').value.trim();
            if (!val) return alert("Enter Name!");
            playerName = val;
            document.getElementById('login-screen').style.display = 'none';
            generateCard();
        }

        function generateCard() {
            const container = document.getElementById('bingo-card');
            container.innerHTML = '';
            // Range 1-60
            let nums = Array.from({length: 60}, (_, i) => i + 1).sort(() => Math.random() - 0.5);
            for (let i = 0; i < 16; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                let val = nums[i];
                cell.innerText = val;
                cell.onclick = () => {
                    if (isLocked) return;
                    startTimer();
                    if (document.getElementById('dev-mode-toggle').checked || calledNumbers.includes(Number(val))) {
                        cell.classList.toggle('selected');
                        if (document.querySelectorAll('.cell.selected').length === 16) win();
                    }
                };
                container.appendChild(cell);
            }
        }

        function startTimer() {
            if (!gameStarted) {
                gameStarted = true;
                stopwatchInterval = setInterval(() => {
                    totalSecondsPlayed++;
                    let m = Math.floor(totalSecondsPlayed/60), s = totalSecondsPlayed%60;
                    document.getElementById('live-clock').innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
                }, 1000);
            }
        }

        function drawNumber() {
            if (isLocked) return;
            startTimer();
            if (calledNumbers.length >= 60) return;
            let n; do { n = Math.floor(Math.random()*60)+1; } while(calledNumbers.includes(n));
            calledNumbers.push(n);

            document.getElementById('number-display').innerText = n;
            updateHistoryUI();

            // Timer removed from here
        }

        function updateHistoryUI() {
            const historyBox = document.getElementById('called-numbers-history');
            historyBox.innerHTML = '';
            [...calledNumbers].reverse().forEach(num => {
                let span = document.createElement('span');
                span.className = 'history-item';
                span.innerText = num;
                historyBox.appendChild(span);
            });
        }

        function startCooldown() {
            let timeLeft = 600;
            const timer = setInterval(() => {
                let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
                document.getElementById('cooldown-text').innerText = `Wait: ${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    document.getElementById('cooldown-text').innerText = "System Ready!";
                    document.getElementById('play-again-btn').disabled = false;
                }
                timeLeft--;
            }, 1000);
        }

        function win() {
            isLocked = true;
            clearInterval(stopwatchInterval);
            const finalTime = document.getElementById('live-clock').innerText;
            document.getElementById('win-player-name').innerText = playerName.toUpperCase();
            document.getElementById('win-time').innerText = "Final Time: " + finalTime;
            document.getElementById('win-overlay').classList.add('show');
            startCooldown();
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ name: playerName, playtime: finalTime, seconds: totalSecondsPlayed }) });
        }
    </script>
</body>
</html>
